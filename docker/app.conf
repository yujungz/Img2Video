# Img2Video Application Server - HTTP (port 8103)
server {
    listen 8103 default_server;
    server_name _ localhost;

    charset utf-8;

    # Root redirect to frontend
    location / {
        return 302 /front;
    }

    # Frontend SPA
    location /front {
        root /var/www;
        index index.html;
        try_files /front$uri /front/index.html;
    }

    # Admin SPA
    location /admin {
        root /var/www;
        index index.html;
        try_files /admin$uri /admin/index.html;
    }

    # Backend API - via /back (for external access)
    # e.g. /back/auth/login -> proxy to backend /api/auth/login
    location /back/ {
        proxy_pass http://127.0.0.1:8102/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Backend API - via /api (for internal frontend/admin SPA calls)
    # Passes the original URI as-is to the backend
    location /api/ {
        proxy_pass http://127.0.0.1:8102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

