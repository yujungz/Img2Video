# DEPRECATED - Use all-in-one Docker deployment instead.
# This file is for standalone frontend container only.
# For production, use the root Dockerfile (all-in-one) with docker/app.conf.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Handle SPA routing (built with base: /front)
    location /front {
        alias /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /front/index.html;
    }

    # Root redirect to /front
    location / {
        return 302 /front;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
